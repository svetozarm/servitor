<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>servitor</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=JetBrains+Mono&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f4f1eb;
        color: #0f4a63;
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
      }
      h1 {
        font-size: 2.5rem;
        letter-spacing: 0.2em;
        color: #1a6b8a;
        margin-bottom: 0.3em;
      }
      .subtitle {
        font-size: 0.85rem;
        letter-spacing: 0.3em;
        color: #2889ab;
        margin-bottom: 1.5rem;
        font-family: "JetBrains Mono", monospace;
        font-style: normal;
      }
      .hero {
        max-width: 320px;
        margin-bottom: 2rem;
      }
      .apps {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
      }
      .app-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.8rem 2rem;
        border: 1px solid #d4cfc7;
        border-radius: 4px;
        color: #0f4a63;
        text-decoration: none;
        font-size: 1.1rem;
        font-family: "JetBrains Mono", monospace;
        font-style: normal;
        transition: all 0.2s ease;
        background: #e8e4dd;
      }
      .app-link:hover {
        border-color: #1a6b8a;
        color: #1a6b8a;
        background: #f4f1eb;
        box-shadow: 0 2px 8px rgba(26, 107, 138, 0.1);
      }
      .glyph {
        color: #c4785a;
        font-size: 0.7em;
        transition: opacity 0.2s;
      }
    </style>
  </head>
  <body>
    <img src="/.servitor/hero.png" alt="servitor" class="hero" />
    <h1>servitor</h1>
    <p class="subtitle">software as a repository</p>
    <div class="apps">
      {{range .}}<a href="/{{.}}/" class="app-link"
        ><span class="glyph">&#x2B22;</span> {{.}}</a
      >{{end}}
    </div>
  </body>
</html>
